name: Run Daily AI Chores Agent

on:
  schedule:
    - cron: '52 2 * * *'  # Runs automatically at 8:22 AM IST
  workflow_dispatch:      # Allows you to run it manually

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml google-genai

      - name: Run automated core agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SMTP_SERVER: 'smtp.gmail.com'
          SMTP_PORT: '587'
          # This maps BOTH possible secret naming variations so it never fails!
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL || secrets.EMAIL_SENDER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL || secrets.EMAIL_RECEIVER }}
        run: python agent.py
